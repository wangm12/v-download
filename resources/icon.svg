<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Rotated YouTube shape: tall rounded rectangle (white) -->
  <rect x="302" y="152" width="420" height="720" rx="90" ry="90" fill="white" opacity="0.95"/>
  <!-- Downward-pointing triangle (centered in the white rect) -->
  <polygon points="380,370 644,370 512,650" fill="url(#bg)"/>
</svg>
